<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Da Eun Park</title>
  <meta name="description" content="Academic personal website of Da Eun Park" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <div class="site-shell">
    <aside class="sidebar" aria-label="Profile">
      <div class="profile-card">
        <img id="profile-photo" class="profile-photo" alt="" hidden />
        <h1 id="name">Da Eun Park</h1>
        <p id="name-korean" class="muted"></p>
        <p id="title" class="title"></p>
        <p id="affiliation" class="muted"></p>

        <div id="contact" class="contact"></div>
        <div id="links" class="links"></div>
      </div>

      <nav class="toc" aria-label="Page sections">
        <a href="#about">About</a>
        <a href="#interests">Research Interests</a>
        <a href="#research">Research</a>
        <a href="#education">Education</a>
        <a href="#experience">Experience</a>
        <a href="#honors">Honors</a>
      </nav>
    </aside>

    <main id="main" class="content">
      <section id="about" class="section">
        <h2>About</h2>
        <div id="bio"></div>
      </section>

      <section id="news" class="section optional-section">
        <h2>News</h2>
        <ul id="news-list" class="compact-list"></ul>
      </section>

      <section id="interests" class="section">
        <h2>Research Interests</h2>
        <ul id="interests-list" class="tag-list"></ul>
      </section>

      <section id="research" class="section">
        <h2>Research</h2>
        <div id="research-list"></div>
      </section>

      <section id="publications" class="section optional-section">
        <h2>Publications & Working Papers</h2>
        <ol id="publications-list" class="publication-list"></ol>
      </section>

      <section id="education" class="section">
        <h2>Education</h2>
        <div id="education-list"></div>
      </section>

      <section id="experience" class="section optional-section">
        <h2>Experience</h2>
        <div id="experience-list"></div>
      </section>

      <section id="teaching" class="section optional-section">
        <h2>Teaching</h2>
        <div id="teaching-list"></div>
      </section>

      <section id="honors" class="section optional-section">
        <h2>Honors & Awards</h2>
        <div id="honors-list"></div>
      </section>

      <section id="service" class="section optional-section">
        <h2>Service</h2>
        <div id="service-list"></div>
      </section>

      <footer class="footer">
        <span id="last-updated"></span>
      </footer>
    </main>
  </div>

  <script src="site-data.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
